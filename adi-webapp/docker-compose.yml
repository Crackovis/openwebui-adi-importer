services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    command: sh -lc "cd server && if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm install; fi && npm run dev"
    env_file:
      - .env
    environment:
      PYTHON_BIN: python3
      IMPORTER_ROOT: /importer-scripts
      PATH_MAPPING: ${PATH_MAPPING:-C:/pinokio;/pinokio}
      OPENWEBUI_DISCOVERY_URLS: ${OPENWEBUI_DISCOVERY_URLS:-http://host.docker.internal:42004,http://host.docker.internal:3000,http://host.docker.internal:8080}
      OPENWEBUI_DATA_DIR: ${OPENWEBUI_DATA_DIR:-/pinokio/api/OpenWebUI/app/env/Lib/site-packages/open_webui/data}
      OPENWEBUI_PINOKIO_ROOT: ${OPENWEBUI_PINOKIO_ROOT:-/pinokio}
    volumes:
      - ./:/workspace
      - ../openwebui-importer:/importer-scripts:ro
      - server_node_modules:/workspace/server/node_modules
      - app_storage:/workspace/storage
      - "${PINOKIO_HOST_ROOT:-C:/pinokio}:/pinokio:ro"
    ports:
      - "8787:8787"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q --spider http://127.0.0.1:8787/api/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s

  web:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -lc "cd web && if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm install; fi && npm run dev -- --host 0.0.0.0 --port ${WEB_PORT:-5173}"
    environment:
      VITE_API_BASE_URL: http://localhost:8787
    volumes:
      - ./:/workspace
      - web_node_modules:/workspace/web/node_modules
    ports:
      - "${WEB_PORT:-5173}:${WEB_PORT:-5173}"
    depends_on:
      server:
        condition: service_healthy

volumes:
  server_node_modules:
  web_node_modules:
  app_storage:
